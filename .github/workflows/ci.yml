name: CI

on:
    push:
        branches:
            - master
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

jobs:
    root-lint:
        runs-on: ubuntu-latest
        if: github.event.pull_request.draft == false
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: npm install

            - name: Lint
              run: npm run lint

    task-lint-and-test:
        runs-on: ubuntu-latest
        if: github.event.pull_request.draft == false
        defaults:
            run:
                working-directory: task
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: npm install

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

    api-lint-and-test:
        runs-on: ubuntu-latest
        if: github.event.pull_request.draft == false
        services:
            postgres:
                image: postgis/postgis:17-master
                env:
                    POSTGRES_HOST_AUTH_METHOD: trust
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            memcached:
                image: memcached:1.6
                ports:
                    - 11211:11211
        defaults:
            run:
                working-directory: api
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Create test database
              run: |
                  PGPASSWORD="" psql -h localhost -U postgres -c "CREATE DATABASE openaddresses_test"

            - run: npm install

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test
